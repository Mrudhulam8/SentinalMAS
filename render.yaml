# Render blueprint for the SecureOrch FastAPI backend.
# Deploy: Render Dashboard → New → Blueprint → connect this repo.
# Secrets (sync: false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: secureorch-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: GEMINI_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: NVD_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      # Comma-separated; set to your deployed frontend origin, e.g.
      # https://secureorch.vercel.app
      - key: CORS_ORIGINS
        sync: false
